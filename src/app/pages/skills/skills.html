<div class="skills-page">

  <header class="page-header">
    <div class="page-header__text">
      <p class="page-header__eyebrow">Stack · habilidades</p>
      <h1 class="page-header__title">Skills más importantes</h1>
    </div>
    <app-decor-shapes class="page-header__shapes" />
  </header>

  <!-- Cards grid -->
  <div class="skills-grid" role="list" #grid>
    @for (cat of categories; track cat.id) {
      <article class="skill-card" [id]="cat.id" role="listitem"
               [style.--cat]="cat.color"
               [class.skill-card--narrow]="cat.skills.length <= 4">

        <div class="skill-card__icons" role="list" [attr.aria-label]="cat.name + ' stack'">
          @for (skill of cat.skills; track skill.name) {
            <div class="skill-card__icon" role="listitem">
              <div class="skill-card__icon-box">
                <i [class]="skill.iconClass" aria-hidden="true"></i>
              </div>
              <span class="skill-card__icon-name">{{ skill.name }}</span>
            </div>
          }
        </div>

        <footer class="skill-card__footer">
          <h2 class="skill-card__name">{{ cat.name }}</h2>
          <p class="skill-card__desc">{{ cat.description }}</p>
        </footer>
      </article>
    }
  </div>

</div>
