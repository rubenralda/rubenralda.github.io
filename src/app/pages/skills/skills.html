<div class="skills-page">
  <header class="page-header">
    <h1 class="page-header__title">Skills más importantes</h1>
    <nav class="page-header__social" aria-label="Redes sociales">
      <a href="https://github.com/rubenralda" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
        <i class="devicon-github-original" aria-hidden="true"></i>
      </a>
      <a href="https://linkedin.com/in/rubenralda" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
        <i class="devicon-linkedin-plain colored" aria-hidden="true"></i>
      </a>
      <a href="mailto:rubenralda@gmail.com" aria-label="Correo electrónico">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
          <path d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
    </nav>
  </header>

  <div class="skills-grid" role="list">
    @for (cat of categories; track cat.id) {
      <div class="skill-card" role="listitem">
        <h2 class="skill-card__name">{{ cat.name }}</h2>
        <p class="skill-card__desc">{{ cat.description }}</p>
        <div class="skill-card__icons" role="list" [attr.aria-label]="cat.name">
          @for (skill of cat.skills; track skill.name) {
            <div class="skill-icon" role="listitem" [title]="skill.name">
              <i [class]="skill.iconClass" aria-hidden="true"></i>
              <span class="skill-icon__name">{{ skill.name }}</span>
            </div>
          }
        </div>
      </div>
    }
  </div>
</div>
