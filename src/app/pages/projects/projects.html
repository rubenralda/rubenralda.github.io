<div class="projects-page">
  <header class="page-header">
    <div class="page-header__text">
      <p class="page-header__title">Un recorrido por mi trayectoria profesional.</p>
    </div>
    <app-decor-shapes class="page-header__shapes" />
  </header>

  @for (group of groups; track group.id) {
    @if (group.items.length) {
      <section class="track-group" [style.--accent-cat]="group.accent">
        <div class="track-group__head">
          <h2 class="track-group__name">{{ group.name }}</h2>
          
        </div>
        <app-card-project [projects]="group.items" (open)="open($event.project)" />
      </section>
    }
  }

  @if (upcoming.length) {
    <section class="track-group track-group--soon" [style.--accent-cat]="'var(--text-muted)'">
      <div class="track-group__head">
        <h2 class="track-group__name">En camino</h2>
      </div>
      <app-card-project [projects]="upcoming" (open)="open($event.project)" />
    </section>
  }

  @if (activeProject()) {
    <app-project-modal
      [project]="activeProject()!.project"
      [index]="activeProject()!.index"
      (closed)="close()" />
  }
</div>
