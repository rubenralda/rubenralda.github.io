<div class="projects-grid" role="list">
  @for (project of projects(); track project.id; let i = $index) {
      <button
      class="project-card"
      role="listitem"
      (click)="onCardClick(project, i)"
      [attr.aria-label]="'Ver detalles de ' + project.title">

      <div class="project-card__thumb" [style.background]="project.gradient" aria-hidden="true"></div>

      <div class="project-card__meta">
          <div class="project-card__arrow" aria-hidden="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                  stroke="currentColor" stroke-width="1.5"
                  stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 17L17 7M17 7H7M17 7V17"/>
          </svg>
          </div>
          <span class="project-card__title">{{ project.title }}</span>
      </div>
      </button>
  }
  </div>
