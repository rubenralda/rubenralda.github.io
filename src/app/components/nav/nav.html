<nav [class.scrolled]="scrolled()">
  <a routerLink="/" class="brand" aria-label="Inicio">© Rubén Ralda</a>
  <ul class="links" role="list">
    <li><a routerLink="/projects" routerLinkActive="active">Trayectoria</a></li>
    <li><a routerLink="/skills" routerLinkActive="active">Skills</a></li>
    <li><a href="mailto:rubenralda@gmail.com" class="contact-btn">Contacto</a></li>
    <li>
      <button
        class="theme-btn"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.theme() === 'dark' ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro'">
        @if (theme.theme() === 'dark') {
          <!-- Sun icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        }
      </button>
    </li>
  </ul>
</nav>
