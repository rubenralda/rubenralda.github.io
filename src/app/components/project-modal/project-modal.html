<div class="backdrop" (click)="closed.emit()" aria-hidden="true"></div>

<div class="panel"
     role="dialog"
     aria-modal="true"
     [attr.aria-label]="project().title"
     (click)="$event.stopPropagation()">

  <!-- Gradient band header -->
  <div class="panel__band" [style.background]="project().gradient" aria-hidden="true">
    <span class="panel__num" aria-hidden="true">{{ indexLabel }}</span>
    <button class="panel__close" (click)="closed.emit()" aria-label="Cerrar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.5" stroke-linecap="round" aria-hidden="true">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Content -->
  <div class="panel__body">
    <div class="panel__header">
      <span class="panel__badge"
            [style.color]="project().categoryColor"
            [style.background]="project().categoryColor + '1a'">
        {{ project().category }}
      </span>
      <h2 class="panel__title">{{ project().title }}</h2>
    </div>

    <p class="panel__desc">{{ project().description }}</p>

    <div class="panel__stack" role="list" [attr.aria-label]="'Tech stack de ' + project().title">
      @for (tech of project().tech; track tech) {
        <span class="panel__tag" role="listitem">{{ tech }}</span>
      }
    </div>

    <div class="panel__actions">
      @if (project().repoUrl) {
        <a [href]="project().repoUrl"
           target="_blank"
           rel="noopener noreferrer"
           class="panel__btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0 1 12 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          GitHub
        </a>
      }
      @if (project().demoUrl) {
        <a [href]="project().demoUrl"
           target="_blank"
           rel="noopener noreferrer"
           class="panel__btn panel__btn--accent">
          Ver Demo
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M7 17L17 7M17 7H7M17 7V17"/>
          </svg>
        </a>
      }
    </div>
  </div>
</div>
